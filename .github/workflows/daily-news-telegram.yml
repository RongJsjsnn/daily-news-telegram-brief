name: Daily News Email Brief

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-news-email-brief
  cancel-in-progress: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 140
    env:
      NOTIFIER: smtp
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_TO: qiusongchen123@gmail.com
      SMTP_USE_SSL: "false"
      ARCHIVE_DIR: news
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r news-push/requirements.txt

      - name: Run news push with retries
        id: push
        working-directory: news-push
        shell: bash
        run: |
          set -euo pipefail
          attempts=3
          attempt=1
          report_dir="reports"
          mkdir -p "$report_dir"
          last_report=""
          while [ "$attempt" -le "$attempts" ]; do
            report_file="$report_dir/execution_report_attempt_${attempt}.md"
            last_report="$report_file"
            echo "Attempt $attempt/$attempts at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            if python scripts/run_news_push_once.py \
              --report-file "$report_file" \
              --attempt "$attempt" \
              --max-attempts "$attempts"; then
              echo "report_file=$report_file" >> "$GITHUB_OUTPUT"
              echo "attempt_count=$attempt" >> "$GITHUB_OUTPUT"
              echo "push_status=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt failed"
            if [ "$attempt" -lt "$attempts" ]; then
              echo "Sleeping 1800 seconds before retry"
              sleep 1800
            fi
            attempt=$((attempt + 1))
          done
          echo "report_file=$last_report" >> "$GITHUB_OUTPUT"
          echo "attempt_count=$attempts" >> "$GITHUB_OUTPUT"
          echo "push_status=failure" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Publish execution report
        if: always()
        working-directory: news-push
        run: |
          {
            echo "## Execution Report"
            echo
            if [ -f "${{ steps.push.outputs.report_file }}" ]; then
              cat "${{ steps.push.outputs.report_file }}"
            else
              echo "No execution report generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-execution-${{ github.run_id }}
          path: |
            news-push/output/*_brief.md
            news-push/news/*.md
            news-push/logs/news_push.log
            news-push/reports/execution_report_attempt_*.md

      - name: Fail with latest log excerpt
        if: failure()
        shell: bash
        run: |
          if [ -f news-push/logs/news_push.log ]; then
            tail -n 120 news-push/logs/news_push.log
          fi
