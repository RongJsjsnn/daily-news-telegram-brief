name: Daily News Telegram Brief

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: news-push

    env:
      TIMEZONE: Asia/Shanghai
      NOTIFIER: telegram
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      LOOKBACK_HOURS: "24"
      ITEMS_PER_SECTION: "3"
      MIN_ITEMS_PER_SECTION: "2"
      REQUEST_TIMEOUT: "12"
      REQUEST_RETRIES: "3"
      RETRY_BACKOFF_SECONDS: "1.5"
      MILITARY_FILTER_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: news-push/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Telegram secrets
        run: |
          test -n "$BOT_TOKEN"
          test -n "$CHAT_ID"

      - name: Send daily brief
        run: python main.py once
